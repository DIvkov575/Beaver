beaver:
  project_id: neon-circle-400322
  region: us-east1


sources:
  pubsub_in:
    type: gcp_pubsub
    project: "neon-circle-400322"
    subscription: "beaver-test-pipeline-input-sub"
    decoding:
      codec: "json"

transforms:
  transform1:
    type: remap
    inputs:
      - pubsub_in
    source: |
      . = .

# SOC triage dashboard provisioned in Cloud Monitoring. Opt-in.
